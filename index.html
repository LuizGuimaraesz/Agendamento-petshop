<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agendamento petshop</title>
  </head>

  <body>
    <img src="./assets/App Name.svg" alt="Logo do petshop" id="logo" />

    <main>
      <header id="header-main">
        <div id="header-p">
          <h1>Sua agenda</h1>
          <p>
            Aqui você pode ver todos os clientes e serviços agendados para hoje.
          </p>
        </div>

        <div class="datetime-input">
          <img
            src="./assets/Calendar-Minimalistic--Streamline-Solar.svg"
            alt=""
          />

          <input type="date" class="date" required />

          <img src="./assets/Icon.svg" alt="" class="arrow" />
        </div>
      </header>

      <section class="periods">
        <!-- MANHÃ -->

        <div class="period morning">
          <header class="period-header">
            <div>
              <img src="./assets/Sun-Fog--Streamline-Solar.svg" alt="" />

              <span class="period-title">Manhã</span>
            </div>

            <span class="period-time">09h–12h</span>
          </header>

          <ul class="schedule-list"></ul>
        </div>

        <!-- TARDE -->

        <div class="period afternoon">
          <header class="period-header">
            <div>
              <img src="./assets/Cloud-Sun-4--Streamline-Solar.svg" alt="" />

              <span class="period-title">Tarde</span>
            </div>

            <span class="period-time">13h–18h</span>
          </header>

          <ul class="schedule-list"></ul>
        </div>

        <!-- NOITE -->

        <div class="period evening">
          <header class="period-header">
            <div>
              <img src="./assets/Moon-Stars--Streamline-Solar.svg" alt="" />

              <span class="period-title">Noite</span>
            </div>

            <span class="period-time">19h–21h</span>
          </header>

          <ul class="schedule-list"></ul>
        </div>
      </section>
    </main>

    <button id="new-schedule">NOVO AGENDAMENTO</button>

    <div class="modal-overlay hidden">
      <div class="modal">
        <div class="modal-content">
          <header class="modal-header">
            <h2>Agende um atendimento</h2>
            <p>Preencha os dados do cliente para realizar o agendamento:</p>
          </header>

          <form class="modal-form">
            <div class="modal-form-group">
              <label>Nome do tutor</label>

              <div class="div-input">
                <img src="./assets/User--Streamline-Solar.svg" alt="" />

                <input
                  type="text"
                  id="tutor-name"
                  pattern="[A-Za-zÀ-ÿ\s'-]+"
                  required
                />
              </div>
            </div>

            <div class="modal-form-group">
              <label>Nome do pet</label>

              <div class="div-input">
                <img src="./assets/Pet-Paw--Streamline-Core.svg" alt="" />

                <input
                  type="text"
                  id="pet-name"
                  pattern="[A-Za-zÀ-ÿ\s'-]+"
                  required
                />
              </div>
            </div>

            <div class="modal-form-group">
              <label>Telefone</label>

              <div class="div-input">
                <img src="./assets/Phone--Streamline-Solar.svg" alt="" />

                <input type="tel" id="telephone" required />
              </div>
            </div>

            <div class="group-service">
              <label>Descrição do serviço</label>

              <textarea id="service" maxlength="60" required> </textarea>
            </div>

            <div class="datetime">
              <div class="modal-form-group">
                <label>Data</label>

                <div class="datetime-input">
                  <img
                    src="./assets/Calendar-Minimalistic--Streamline-Solar.svg"
                    alt=""
                  />

                  <input type="date" class="date" required />

                  <img src="./assets/Icon.svg" alt="" class="arrow" />
                </div>
              </div>

              <div class="modal-form-group">
                <label>Hora</label>

                <div class="datetime-input">
                  <img
                    src="./assets/Clock-Circle--Streamline-Solar.svg"
                    alt=""
                  />

                  <input type="time" id="time" required />

                  <img src="./assets/Icon.svg" alt="" class="arrow" />
                </div>
              </div>
            </div>

            <button type="submit" id="button-schedule">Agendar</button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
